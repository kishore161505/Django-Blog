{% extends 'base.html'%}

{% block content%}



  <!--Featured Post-->
  <h3 class="text-uppercase text_warning"> Category - {{ category }} </h3>
  <div class="row mb-2">
    {%if posts %}
    {% for post in posts%}
      
    <div class="col-md-6">
      <div class="card border-0" >
        <div class="card-body">
          <h3>{{ post.title }}</h3>
          <small class="mb-1 text-muted">{{ post.created_at | timesince }} ago | {{post.author}}</small>
          <p class="card-text">{{ post.short_description | truncatewords:15 }}</p>
        </div>
      </div>
    </div>
      
    {%endfor%}
    {%else%}
    <h2>No post</h2>
    {%endif%}
  </div>




{% endblock %}
