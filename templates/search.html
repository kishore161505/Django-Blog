{%extends 'base.html' %}

{% block content %}

  <h3 class="text_warning"> Search Term - {{ keyword }} </h3>
  <div class="row mb-2">
    {%if blog %}
    {% for b in blog%}
      
    <div class="col-md-6">
      <div class="card border-0" >
        <div class="card-body">
          <h3>{{ b.title }}</h3>
          <small class="mb-1 text-muted">{{ b.created_at | timesince }} ago | {{b.author}}</small>
          <p class="card-text">{{ b.short_description | truncatewords:15 }}</p>
        </div>
      </div>
    </div>
      
    {%endfor%}
    {%else%}
    <h2>No Bloga</h2>
    {%endif%}
  </div>



{% endblock %}
