{% extends 'base.html' %}

{% block content %}

<div class="row">

    {% include 'dashboard/sidebar.html' %}
    

    <!--Right side bar-->
    <div class="col-md-3">

        <h3> All Categories</h3>

        <a href="{% url 'add_category' %}" class="btn btn-dark text-light float-right mb-2">Add 
        </a>

        <table class="table tabel-hover">
            <thead>
                <tr>
                    <th scope="col">#</th>
                    <th scope="col">Category Name</th>
                    <th scope="col">Created At</th>
                    <th scope="col">Updated At</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for i in categories %}
                <tr>
                    <td>{{ forloop.counter }}</td>
                    <td>{{ i }}</td>
                    <td>{{ i.created_at }}</td>
                    <td>{{i.updated_at}}</td>
                    <td>
                        <a href="{% url 'edit_category' i.id %}"><i class="fa fa-edit text-success"></i></a>
                        &nbsp;
                        <a href="{% url 'delete_category' i.id %}"><i class="fa fa-trash text-danger"></i></a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</div>


{% endblock %}
