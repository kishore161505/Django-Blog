{% extends 'base.html' %}

{% block content %}


{% load crispy_forms_tags %}

<div class="row">

    {% include 'dashboard/sidebar.html' %}
    

    <!--Right side bar-->
    <div class="col-md-3">

        <h3> All New Blog Post</h3>

        <form action = "{% url 'add_post' %}" method="POST" enctype="multipart/form-data">

            {%csrf_token%}

            {{form | crispy }}

            <button type="submit" class = "btn btn-warning">Submit</button>

        </form>
        <br>
    </div>


{% endblock %}
